name: Render & Publish Quarto Site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/quarto-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies for figures
        run: pip install jupyter matplotlib numpy scipy scikit-learn

      # continue-on-error so a render failure does NOT fail the job: the landing page and the
      # last-committed report HTML still deploy (the committed docs/gwl_hybrid_framework.html is
      # tracked, so a fresh render just overwrites it in place when it succeeds).
      - name: Render Quarto paper (HTML only — PDF skipped; no LaTeX on runner)
        id: render
        continue-on-error: true
        run: quarto render docs/gwl_hybrid_framework.qmd --to html

      # Make a failed render VISIBLE (annotation on the run) instead of silently serving stale HTML.
      - name: Warn if the report render failed
        if: steps.render.outcome == 'failure'
        run: echo "::warning title=Report render failed::Deploying the landing page and the last-committed report.html; the technical report may be stale until the Quarto render is fixed."

      - name: Stage for Pages
        run: |
          mkdir -p _site
          # Landing page (hand-written, static — no Quarto render, so it deploys even if a report
          # render fails) links all reports from one URL: https://gaia-hazlab.github.io/gwl-space-time-smooth/
          cp docs/index.html _site/index.html
          # Technical report at /report.html — freshly rendered if the render step succeeded, else the
          # committed (possibly stale) copy. Conditional so a missing HTML never fails the deploy.
          if [ -f docs/gwl_hybrid_framework.html ]; then cp docs/gwl_hybrid_framework.html _site/report.html; fi
          # Pre-rendered, self-contained pages (figures/GIFs come from gitignored real-data products,
          # so they are served as committed rather than re-rendered on CI).
          for f in gwl_soil_moisture_demo gwl_audit_framework; do
            if [ -f "docs/$f.html" ]; then cp "docs/$f.html" "_site/$f.html"; fi
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
