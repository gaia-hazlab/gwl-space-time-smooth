name: Render & Publish Quarto Site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/quarto-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies for figures
        run: pip install jupyter matplotlib numpy scipy scikit-learn

      # The legacy single-file report (old/docs/gwl_hybrid_framework.qmd) is ARCHIVED and no longer
      # re-rendered on CI: its committed snapshot docs/gwl_hybrid_framework.html is served as-is at
      # /report.html (see the staging step). The multi-doc site under /twin/ is the primary docs.

      # The multi-doc site is the primary documentation (linked chapters). It is a Quarto website
      # project; render it to docs/twin/_site and serve it at /twin/. continue-on-error so a chapter
      # render failure does not take the whole Pages deploy down.
      - name: Render multi-doc site
        id: site
        continue-on-error: true
        run: quarto render docs/twin

      - name: Warn if the site render failed
        if: steps.site.outcome == 'failure'
        run: echo "::warning title=Multi-doc site render failed::The /twin/ chapters may be stale until the render is fixed."

      - name: Stage for Pages
        run: |
          mkdir -p _site
          # Landing page (hand-written, static — no Quarto render, so it deploys even if a render
          # fails) links everything from one URL: https://gaia-hazlab.github.io/gwl-space-time-smooth/
          cp docs/index.html _site/index.html
          # Archived single-file technical report at /report.html — freshly rendered if the render
          # step succeeded, else the committed copy. Conditional so a missing HTML never fails deploy.
          if [ -f docs/gwl_hybrid_framework.html ]; then cp docs/gwl_hybrid_framework.html _site/report.html; fi
          # Pre-rendered, self-contained pages (figures/GIFs come from gitignored real-data products,
          # so they are served as committed rather than re-rendered on CI).
          for f in gwl_soil_moisture_demo gwl_audit_framework; do
            if [ -f "docs/$f.html" ]; then cp "docs/$f.html" "_site/$f.html"; fi
          done

      # Publish the multi-doc site at /twin/ ONLY when its render succeeded — Quarto can leave a
      # partial _site/ behind on failure, so a bare directory check would deploy a broken /twin/.
      - name: Stage the multi-doc site (only on a clean render)
        if: steps.site.outcome == 'success'
        run: cp -r docs/twin/_site _site/twin

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
