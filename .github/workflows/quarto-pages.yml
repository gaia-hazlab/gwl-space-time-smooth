name: Render & Publish Quarto Site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/quarto-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies for figures
        run: pip install jupyter matplotlib numpy scipy scikit-learn

      - name: Render Quarto paper (HTML only — PDF skipped; no LaTeX on runner)
        run: quarto render docs/gwl_hybrid_framework.qmd --to html

      - name: Stage for Pages
        run: |
          mkdir _site
          cp docs/gwl_hybrid_framework.html _site/index.html
          # The GWL + soil-moisture demo is a pre-rendered, self-contained page (its figures/GIFs
          # come from gitignored real-data products, so it is not re-rendered on CI — it is served
          # as committed). Link it from the GAIA soil-reanalysis chapter as:
          #   https://gaia-hazlab.github.io/gwl-space-time-smooth/gwl_soil_moisture_demo.html
          if [ -f docs/gwl_soil_moisture_demo.html ]; then
            cp docs/gwl_soil_moisture_demo.html _site/gwl_soil_moisture_demo.html
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
