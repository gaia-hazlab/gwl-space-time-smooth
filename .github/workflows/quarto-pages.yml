name: Render & Publish Quarto Site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/quarto-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies for figures
        run: pip install jupyter matplotlib numpy scipy

      - name: Render Quarto paper
        # self-contained: true → single .html, no companion _files/ directory
        run: quarto render docs/gwl_hybrid_framework.qmd

      - name: Stage for Pages
        run: |
          mkdir _site
          cp docs/gwl_hybrid_framework.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
