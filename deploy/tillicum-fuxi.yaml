# FuXi 15-day rainfall forecast on UW Hyak Tillicum (H200), via SkyPilot.
#
# Conventions follow gaia-hazlab/skypilot-hyak (templates/nvidia-earth2studio.yaml,
# templates/tillicum-H200.yaml). Set that repo up first -- it has the Tillicum/SkyPilot
# setup notes in docs/tillicum.md.
#
#   sky launch --infra slurm/tillicum -c fuxi deploy/tillicum-fuxi.yaml
#   sky down fuxi                      # Slurm nodes do NOT autostop -- see below
#
# This job ONLY produces the rainfall forcing netCDF. That is deliberate: the soil-state
# forecast (water budget -> theta / GWL / Vs) is pure numpy and costs nothing, so it runs
# locally. The forcing file is the interface between the GPU and the physics:
#
#   Tillicum (H200):  FuXi -> data/forecast/fuxi_precip.nc      (this job)
#   anywhere:         pixi run forecast-leadtime --forcing-nc data/forecast/fuxi_precip.nc
#
# Why FuXi and not GraphCast:
#   - FuXi natively emits tp06; it is a cascade trained for 5/10/15-day leads (we want +1..+15).
#   - It runs on onnxruntime-gpu, not jax[cuda13].
#   - GraphCastOperational emits tp06 as a ZERO-FILLED PLACEHOLDER -- it does not predict rain at
#     all. src.data.fetch_earth2studio.assert_precipitation_is_real refuses it by name.

resources:
  infra: slurm/tillicum
  accelerators: H200:1          # required, else SkyPilot tries to run on the login node

config:
  slurm:
    sbatch_options:
      account: gaia
      # WARNING: time is a HARD limit -- the node is killed at expiry, finished or not, and Slurm
      # nodes do NOT autostop. Size it for the WHOLE SWEEP: 9.4 GB of weights pulled once, then
      # 60 six-hourly steps per init through the 3-model cascade. Start with one init and time it.
      # (The `debug` qos caps runtime at 1 h -- too short for a 29-init sweep.)
      time: "8:00:00"

workdir: .

envs:
  # A COMMA-SEPARATED SWEEP of initialisations, not a single run. `pixi run stage-mvp` prints the
  # exact list of inits still missing from Kopah; paste it here (or pass --env INITS=...).
  # A rolling weekly init across the wet season (~29 forecasts) is what lets us measure forecast
  # skill AS A FUNCTION OF LEAD TIME (+1..+15 d) instead of from one lucky run.
  INITS: "2025-12-01"
  LEAD_DAYS: "15"
  # Each init is staged straight to Kopah as Zarr -- nothing is copied by hand (gaia-cli pattern).
  OUT_PREFIX: "s3://gaia/soil-twin/forecast/fuxi"

# Kopah credentials. NOTE (from skypilot-hyak/templates/klone-kopah.yaml): SkyPilot `file_mounts`
# does NOT work with Kopah's custom endpoint, so we do not mount -- we write with the S3 API directly.
# Pass the keys through at launch, do not bake them in:
#   sky launch ... --env AWS_ACCESS_KEY_ID --env AWS_SECRET_ACCESS_KEY
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_ENDPOINT_URL: "https://s3.kopah.uw.edu"
  S3_ENDPOINT_URL: "https://s3.kopah.uw.edu"      # s5cmd/s3cmd read this name
  AWS_DEFAULT_REGION: "us-west-2"

setup: |
  set -euo pipefail
  pip install uv
  uv venv --python 3.11 ~/fuxi-venv
  source ~/fuxi-venv/bin/activate
  # FuXi's extra pins onnxruntime-gpu (NOT jax/cuda -- that is GraphCast's problem)
  uv pip install "earth2studio[fuxi]" xarray zarr obstore boto3 rioxarray

run: |
  set -euo pipefail
  source ~/fuxi-venv/bin/activate
  nvidia-smi

  # Sweep the initialisations. The FuXi weights (9.4 GB, short/medium/long cascade) are pulled ONCE
  # on the first init and cached, so a 29-init sweep is not 29 downloads -- which is exactly why the
  # sweep belongs in one job rather than one job per init (Slurm nodes do not autostop, and `time` is
  # a hard kill: size it for the whole sweep).
  IFS=',' read -ra LIST <<< "${INITS}"
  echo "sweeping ${#LIST[@]} initialisations -> ${OUT_PREFIX}"

  for INIT in "${LIST[@]}"; do
    INIT="$(echo "$INIT" | xargs)"          # trim
    OUT="${OUT_PREFIX}/${INIT}.zarr"
    echo "=== FuXi init ${INIT} -> ${OUT} ==="
    # Fails loudly if tp06 comes back zero-filled (the GraphCastOperational trap) or in wrong units.
    # || true so one bad init (e.g. missing GFS ICs) does not kill the whole sweep.
    python -m src.data.fetch_earth2studio \
      --model FuXi \
      --start "${INIT}" \
      --lead-days "${LEAD_DAYS}" \
      --out "${OUT}" || echo "WARN: init ${INIT} FAILED, continuing sweep"
  done

  echo "=== sweep complete; what landed on Kopah ==="
  python - <<'EOF'
  import os
  from src.io.zarr_store import list_stores, open_zarr
  found = list_stores(os.environ["OUT_PREFIX"])
  print(f"{len(found)} forecasts on Kopah")
  for uri in found:
      try:
          ds = open_zarr(uri)
          tot = float(ds.precip_mm.mean([d for d in ds.precip_mm.dims if d != "lead_time"]).sum())
          print(f"  {uri.split('/')[-1]:22s} {dict(ds.sizes)}  total precip {tot:7.1f} mm")
      except Exception as exc:
          print(f"  {uri} UNREADABLE: {exc}")
  EOF

# Then, anywhere (no GPU, no file copy -- the Zarr is read lazily from Kopah):
#   pixi run forecast-leadtime --forcing-zarr s3://gaia/soil-twin/forecast/fuxi/2024-12-01.zarr
#
# Static layers live alongside it, staged once:
#   s3://gaia/soil-twin/static/svm_cvm17.zarr   (the 6.2 GB SVM netCDF, chunked -> 756 MB)
#   s3://gaia/soil-twin/static/vs30_90m.zarr    (derived Vs30)
