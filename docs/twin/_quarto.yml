project:
  type: website
  output-dir: _site

website:
  title: "GAIA Digital Twin of Soil"
  description: "A GAIA HazLab digital twin of soil — a coupled 90 m soil reanalysis for the Pacific Northwest."
  reader-mode: true
  page-navigation: true
  navbar:
    background: dark
    search: true
    right:
      - text: "Landing"
        href: "../index.html"
      - icon: github
        href: "https://github.com/gaia-hazlab/gwl-space-time-smooth"
  sidebar:
    style: docked
    collapse-level: 3
    # NOTE: a `section:` entry WITHOUT `contents:` renders as a non-clickable heading in Quarto.
    # Leaf pages must therefore be declared with `text:` + `href:`; `section:` is reserved for
    # genuine groupings that have children.
    contents:
      - text: "Overview"
        href: index.qmd

      - section: "The twin"
        contents:
          - text: "0 · Digital twins and digital shadows"
            href: 00a-digital-twins-review.qmd
          - text: "1 · Structural model"
            href: 00-structural-model.qmd
          - text: "2 · Input data"
            href: 01-input-data.qmd
          - text: "3 · Cyberinfrastructure"
            href: 02b-cyberinfrastructure.qmd
          - text: "4 · Physics — Hydrology"
            href: 03a-physics-hydrology.qmd
          - text: "5 · Physics — Hydromechanics"
            href: 03b-physics-hydromechanics.qmd
          - text: "6 · Memory & disturbance"
            href: 03c-memory-disturbance.qmd
          - text: "7 · Assimilation"
            href: 04-assimilation.qmd
          - text: "8 · Evaluation of the soil state"
            href: 05-state-evaluation.qmd
          - text: "9 · Forecast"
            href: 06-forecast.qmd
          - text: "10 · Hazard integration"
            href: 07-hazard-integration.qmd

      - section: "Reference"
        contents:
          - text: "Evaluation data"
            href: 02-evaluation-data.qmd

      - section: "Appendices"
        contents:
          - text: "A · Compute and deployment"
            href: A-compute-and-deployment.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    fig-format: svg
    fig-dpi: 150
    html-math-method: katex
    code-fold: true
    embed-resources: false

bibliography: ../references.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/american-geophysical-union.csl

execute:
  echo: false
  warning: false
  message: false
  freeze: auto

jupyter: python3
