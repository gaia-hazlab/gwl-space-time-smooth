[workspace]
name = "gaia-soil-reanalysis"
version = "0.1.0"
description = "GAIA digital twin of soil: a coupled 90 m soil reanalysis of groundwater level, soil moisture, and near-surface stiffness (Vs30) with uncertainty and dv/v assimilation"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
python = "3.11.*"
numpy = "*"
pandas = "*"
geopandas = "*"
xarray = "*"
rioxarray = "*"
rasterio = "*"
fiona = "*"
shapely = ">=2.0"
scipy = "*"
scikit-learn = "*"
xgboost = "*"
lightgbm = "*"
matplotlib = "*"
cartopy = "*"
pyproj = "*"
pystac-client = "*"
planetary-computer = "*"
jupyter = "*"
jupyterlab = "*"
dask = "*"
statsmodels = "*"
netcdf4 = "*"
h5py = "*"
pyarrow = "*"
tqdm = "*"
requests = "*"
richdem = "*"
numba = "*"
llvmlite = "*"
earthaccess = ">=0.17.0,<0.18"
h5netcdf = ">=1.8.1,<2"
obspy = ">=1.5.0,<2"

[pypi-dependencies]
dataretrieval = "*"
pykrige = "*"
verde = "*"
mapie = "*"
hsclient = "*"
scikit-gstat = "*"
zarr = "*"
obstore = "*"
hf-hydrodata = "*"
odc-stac = "*"
odc-geo = "*"
py3dep = "*"
pystac = "*"
s3fs = "*"
pystac-client = "*"
seisfetch = { git = "https://github.com/Denolle-Lab/seisfetch.git", extras = ["fdsn", "auth", "pandas", "xarray"] }
disba = ">=0.7, <0.8"
codameter = { git = "https://github.com/Denolle-Lab/codameter.git" }

[tasks]
# === Primary pipeline ===
data = "python -m src.data.download_nwis --start-date 2000-01-01 --output-dir data/raw/nwis"
qc = "python -m src.data.qc_nwis --input-dir data/raw/nwis --output data/processed/nwis_gwlevels_monthly.parquet"
3dep = "python -m src.data.download_3dep --output-dir data/raw/dem"
terrain = "python -m src.features.compute_terrain --dem data/raw/dem/3dep_10m_5070.tif --output-dir data/processed"
gaia-data = "python -m src.data.fetch_gaia --output-dir data/processed"
climate = "python -m src.data.fetch_climate --output-dir data/processed"
grid = "python -m src.features.compute_grid --output-dir data/processed"
baseline = "python -m src.models.baseline_regression --sites data/processed/nwis_sites_clean.parquet --max-well-depth-m 30 --output-dir data/processed"
climate-response = "python -m src.models.climate_response --monthly data/processed/nwis_gwlevels_monthly.parquet --sites data/processed/nwis_sites_clean.parquet --output-dir data/processed"
residuals = "python -m src.models.interpolate_residuals --monthly data/processed/nwis_gwlevels_monthly.parquet --output-dir data/processed"
# === Lithology (intermediate/local, until DataHub lithology-stac is live) ===
list-geology-units = "python -m src.data.rasterize_geology --geology data/raw/geology/wa_dnr_geol.gpkg --crosswalk data/processed/lithology_crosswalk.json --list-units"
lithology-local = "python -m src.data.rasterize_geology --geology data/raw/geology/wa_dnr_geol.gpkg --crosswalk data/processed/lithology_crosswalk.json --like data/processed/terrain_hand_90m.tif --output data/processed/lithology_90m.tif"
# === gaia-soil-hydromechanics state modules ===
# Dynamic climate forcing for soil moisture — two interchangeable sources (forcing ensemble):
terraclimate = "python -m src.data.fetch_terraclimate --output data/processed/terraclimate_monthly_puget.zarr"
prism = "python -m src.data.fetch_prism_monthly --output data/processed/prism_monthly_puget.zarr"  # obs-based; ppt+tmean→Hamon PET
# In-situ soil-moisture station networks (assimilation + validation), unified by soil_moisture_stations.
# SNOTEL (NRCS AWDB) — mountain-focused θ anchors (#28).
snotel = "python -m src.data.fetch_snotel --output data/processed/snotel_soil_moisture_monthly.parquet"
# USCRN (NOAA) — research-grade public flat files; valley/lowland complement to SNOTEL.
uscrn = "python -m src.data.fetch_uscrn --output data/processed/uscrn_soil_moisture_monthly.parquet"
snotel-validate = "python notebooks/validate_snotel.py"
snow-calibrate = "python notebooks/calibrate_snow.py"   # grid + LOSO snow calibration + bias decomposition
snotel-anchor = "python notebooks/anchor_snotel.py"     # obs-anchor θ to SNOTEL over Puget+Cascade (residual anchor + LOSO)
# SMAP satellite soil moisture (NASA Earthdata; needs ~/.netrc) — independent native-scale θ validation (#29).
smap = "python -m src.data.fetch_smap --output data/processed/smap_soil_moisture_monthly_puget.zarr"
smap-validate = "python notebooks/validate_smap.py"
# MERRA-2 reanalysis root-zone soil moisture (GES DISC; ~/.netrc) — depth-matched, incl. 2025; cached locally.
merra2 = "python -m src.data.fetch_merra2 --output data/processed/merra2_soil_moisture_monthly_puget.zarr"
merra2-validate = "python notebooks/validate_merra2.py"
# Soil-moisture state: SOLUS→Saxton-Rawls static envelope × Thornthwaite-Mather dynamic bucket.
soil-moisture = "python -m src.models.soil_moisture --output-dir data/processed"
soil-mechanics = "python -m src.models.soil_mechanics --vs30 data/processed/vs30_90m.tif --dtw data/processed/baseline_dtw_m.tif --output-dir data/processed"  # SCAFFOLD (#19)
# 90 m time-varying products: GWL + θ GIFs and the tracked downscaling uncertainty budget.
products-90m = "python old/notebooks/make_products_90m.py"
# Forcing-ensemble (TerraClimate vs PRISM) + demonstrative dv/v coupling figures.
ensemble-dvv = "python old/notebooks/make_ensemble_dvv_figures.py"
# === dv/v state module (seismic ambient noise -> depth-separated SM + relative WTD) ===
# UW + CC station metadata via seisfetch (cheap; add --waveforms for a bounded download).
seismic = "python -m src.data.fetch_seismic --output data/processed/seismic_stations.parquet"
# dv/v module figure: stations -> freq/depth kernels -> banded dv/v (UQ, codameter) -> SM & WTD.
dvv-demo = "python old/notebooks/make_dvv_figures.py"
# Vs30 near-surface stiffness: Wald-Allen slope proxy (default) / USGS grid / Sanger-Maurer (GAIA).
vs30 = "python -m src.data.fetch_vs30 --source svm --output data/processed/vs30_90m.tif"
# AI weather -> rainfall forcing. Needs earth2studio[graphcast] on a Linux+NVIDIA host
# (jax[cuda13]); will not run on macOS/arm64. Writes data/forecast/graphcast_precip.nc
ai-precip = "python -m src.data.fetch_earth2studio --start 2024-12-01 --lead-days 15"
forecast-leadtime = "python old/notebooks/make_forecast_leadtime.py"
# stage the 6.2 GB SVM netCDF as chunked Zarr (local, or s3://gaia/... on Kopah)
stage-svm-zarr = "python -m src.data.stage_svm_zarr"
# observed daily forcing (gaia prism-stac) + the Dec-2025 hindcast demo
prism-daily = "python -m src.data.fetch_prism_daily --start 2025-12-01 --end 2025-12-31 --out data/processed/prism_daily_puget.zarr"
# MVP window: Fall-Winter 2025-2026. Forcing (PRISM) + state (wells) + flux (USGS gauges)
# -> the water budget can be CLOSED against observations, not just plotted.
# the frozen analysis grid — everything reprojects to this (issue #92)
domain-grid = "python -m src.config.domain"
# D2: 3DEP DEM over the extended domain (tiled download) + GLOBAL flow routing
3dep-domain = "python -m src.data.download_3dep_domain"
terrain-domain = "python -m src.features.compute_terrain_domain"
# D3/D4: soils + Vs30 on the extended domain
solus-domain = "python -m src.data.fetch_solus_domain"
baseline-wt-domain = "python -m src.models.baseline_wt_domain"
# D8: snow is the water table's clock (#100)
snotel-swe = "python -m src.data.fetch_snotel_swe"
calibrate-snow = "python notebooks/calibrate_snow_swe.py"
# D7: joint flux calibration against gauges + wells (closes #88/#90)
calibrate-fluxes = "python notebooks/calibrate_fluxes.py"
# presentation figures on the extended domain
domain-figures = "python notebooks/make_domain_figures.py"
validation-figure = "python notebooks/make_validation_figure.py"
twin-gif = "python notebooks/make_twin_gif.py"
sensor-figure = "python notebooks/make_sensor_figure.py"
observability-figure = "python notebooks/make_observability_figure.py"
observing-system-figure = "python notebooks/make_observing_system_figure.py"
spacetime-figure = "python notebooks/make_spacetime_figure.py"
dvv-proxy-demo = "python notebooks/make_dvv_proxy_demo.py"
hysteresis-demo = "python notebooks/make_hysteresis_demo.py"
cyberinfra-figure = "python notebooks/make_cyberinfra_figure.py"
insitu-sm = "python -m src.data.fetch_insitu_sm"
download-nwis-domain = "python -m src.data.download_nwis_domain"
vs30-domain = "python -m src.data.fetch_vs30 --source svm --svm-zarr data/processed/svm_cvm17.zarr --vs-var vs --depth-name z --like data/processed/domain_grid_90m.tif --output data/processed/vs30_domain_90m.tif --zarr-out data/processed/vs30_domain_90m.zarr"
stage-mvp = "python -m src.data.stage_mvp_window"
gauges = "python -m src.data.fetch_usgs_discharge --start 2025-09-01 --end 2026-03-31"
gauge-basins = "python -m src.data.fetch_gauge_basins"
basin-closure = "python notebooks/close_basin_budget.py"
hindcast = "python old/notebooks/make_forecast_leadtime.py --forcing-zarr data/processed/prism_daily_puget.zarr --lead-days 31 --title 'HINDCAST — December 2025, forced by OBSERVED PRISM daily rainfall (90 m Puget/Cascades)' --out figures/demo/hindcast_dec2025.png"
# Digital-twin MVP: 2x3 animated GIF (GWL, soil moisture, Vs30 + uncertainty) with dv/v assimilation.
digital-twin = "python old/notebooks/make_digital_twin.py"
# Coupled water budget: recharge + capillary rise (#43), saturation-excess runoff + TOPMODEL (#44).
water-budget = "python old/notebooks/make_water_budget_figure.py"
# Well hydrostratigraphic screen diagnostic: shallow water-table vs deep confined-outwash (#46).
well-screen = "python old/notebooks/make_well_screening_figure.py"
# Static-layer catalog figure (real 90 m rasters) for the structural-model chapter.
static-layers = "python old/notebooks/make_static_layers_figure.py"
# LandLab dynamic export (#64): water table + saturation fraction + recharge -> canonical .asc + COG.
landlab-export = "python -m src.io.landlab_export"
# Demo figure of the exported LandLab bundle (fields + per-cell sigma).
landlab-export-figure = "python old/notebooks/make_landlab_export_figure.py"
# Demo: static figures + GIFs + provenance, assembled into the self-contained Quarto page.
demo = "python old/notebooks/demo_gwl_sm.py && python old/notebooks/make_products_90m.py && python old/notebooks/make_ensemble_dvv_figures.py && python old/notebooks/build_demo_qmd.py && quarto render old/docs/gwl_soil_moisture_demo.qmd --to html"
# === Legacy (comparison only) ===
baseline-legacy = "python -m src.models.interpolate_baseline"
anomalies-legacy = "python -m src.models.interpolate_anomalies"
# === Housekeeping ===
eda = "jupyter nbconvert --execute notebooks/01_eda.ipynb --to html"
lab = "jupyter lab"
clean = "rm -f data/processed/nwis_gwlevels_monthly.parquet data/processed/nwis_sites_clean.parquet data/processed/qc_report.json"
